<svg viewBox="0 0 620 900" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="620" height="900" fill="#0f172a"/>
  <text x="310" y="35" text-anchor="middle" fill="#f1f5f9" font-size="20" font-weight="bold">Working Principle — Flowchart</text>

  <!-- Start -->
  <ellipse cx="310" cy="80" rx="90" ry="30" fill="#166534" stroke="#4ade80" stroke-width="2"/>
  <text x="310" y="86" text-anchor="middle" fill="#f0fdf4" font-size="13">Start</text>
  <path d="M310 110 L310 145" stroke="#64748b" stroke-width="2" marker-end="url(#a)"/>

  <!-- Init sensors -->
  <rect x="180" y="145" width="260" height="55" rx="8" fill="#1e3a5f" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="310" y="178" text-anchor="middle" fill="#e2e8f0" font-size="13">Initialize sensors (BME280,</text>
  <text x="310" y="193" text-anchor="middle" fill="#e2e8f0" font-size="13">DS18B20, wind, rain gauge)</text>
  <path d="M310 200 L310 235" stroke="#64748b" stroke-width="2" marker-end="url(#a)"/>

  <!-- Loop start -->
  <rect x="180" y="235" width="260" height="55" rx="8" fill="#1e3a5f" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="310" y="268" text-anchor="middle" fill="#e2e8f0" font-size="13">Read sensor values</text>
  <path d="M310 290 L310 325" stroke="#64748b" stroke-width="2" marker-end="url(#a)"/>

  <!-- Process -->
  <rect x="180" y="325" width="260" height="55" rx="8" fill="#1e3a5f" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="310" y="350" text-anchor="middle" fill="#e2e8f0" font-size="13">Merge readings into a</text>
  <text x="310" y="365" text-anchor="middle" fill="#e2e8f0" font-size="13">single timestamped record</text>
  <path d="M310 380 L310 415" stroke="#64748b" stroke-width="2" marker-end="url(#a)"/>

  <!-- Display -->
  <rect x="180" y="415" width="260" height="55" rx="8" fill="#1e3a5f" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="310" y="448" text-anchor="middle" fill="#e2e8f0" font-size="13">Display reading on console</text>
  <path d="M310 470 L310 505" stroke="#64748b" stroke-width="2" marker-end="url(#a)"/>

  <!-- Log -->
  <rect x="180" y="505" width="260" height="55" rx="8" fill="#7c2d12" stroke="#fb923c" stroke-width="1.5"/>
  <text x="310" y="538" text-anchor="middle" fill="#fff7ed" font-size="13">Log reading to CSV file</text>
  <path d="M310 560 L310 595" stroke="#64748b" stroke-width="2" marker-end="url(#a)"/>

  <!-- Decision -->
  <polygon points="310,595 410,650 310,705 210,650" fill="#4c1d95" stroke="#a78bfa" stroke-width="2"/>
  <text x="310" y="646" text-anchor="middle" fill="#ede9fe" font-size="12">Run in</text>
  <text x="310" y="662" text-anchor="middle" fill="#ede9fe" font-size="12">continuous mode?</text>

  <!-- Yes -> loop back -->
  <path d="M210 650 L110 650 L110 262 L180 262" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#a)"/>
  <text x="140" y="640" fill="#94a3b8" font-size="11">Yes — wait interval</text>

  <!-- No -> end -->
  <path d="M310 705 L310 740" stroke="#64748b" stroke-width="2" marker-end="url(#a)"/>
  <text x="345" y="725" fill="#94a3b8" font-size="11">No</text>

  <!-- End -->
  <ellipse cx="310" cy="775" rx="90" ry="30" fill="#7f1d1d" stroke="#f87171" stroke-width="2"/>
  <text x="310" y="781" text-anchor="middle" fill="#fef2f2" font-size="13">End / Exit</text>

  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
