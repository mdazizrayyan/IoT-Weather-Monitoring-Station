<svg viewBox="0 0 900 480" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="900" height="480" fill="#0f172a"/>
  <text x="450" y="35" text-anchor="middle" fill="#f1f5f9" font-size="22" font-weight="bold">System Architecture — IoT Weather Monitoring Station</text>

  <!-- Sensor layer -->
  <g>
    <rect x="30" y="70" width="150" height="60" rx="8" fill="#1e3a5f" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="105" y="95" text-anchor="middle" fill="#e2e8f0" font-size="13">BME280</text>
    <text x="105" y="112" text-anchor="middle" fill="#94a3b8" font-size="10">Temp/Humidity/Pressure</text>

    <rect x="30" y="150" width="150" height="60" rx="8" fill="#1e3a5f" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="105" y="175" text-anchor="middle" fill="#e2e8f0" font-size="13">DS18B20</text>
    <text x="105" y="192" text-anchor="middle" fill="#94a3b8" font-size="10">Probe Temperature</text>

    <rect x="30" y="230" width="150" height="60" rx="8" fill="#1e3a5f" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="105" y="255" text-anchor="middle" fill="#e2e8f0" font-size="13">Anemometer</text>
    <text x="105" y="272" text-anchor="middle" fill="#94a3b8" font-size="10">Wind Speed</text>

    <rect x="30" y="310" width="150" height="60" rx="8" fill="#1e3a5f" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="105" y="335" text-anchor="middle" fill="#e2e8f0" font-size="13">Wind Vane</text>
    <text x="105" y="352" text-anchor="middle" fill="#94a3b8" font-size="10">Wind Direction (via MCP3008)</text>

    <rect x="30" y="390" width="150" height="60" rx="8" fill="#1e3a5f" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="105" y="415" text-anchor="middle" fill="#e2e8f0" font-size="13">Rain Gauge</text>
    <text x="105" y="432" text-anchor="middle" fill="#94a3b8" font-size="10">Rainfall (tipping bucket)</text>
  </g>

  <!-- Arrows to Pi -->
  <g stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <path d="M180 100 L340 100 L340 220"/>
    <path d="M180 180 L340 180 L340 220"/>
    <path d="M180 260 L340 260 L340 220"/>
    <path d="M180 340 L340 340 L340 260"/>
    <path d="M180 420 L340 420 L340 260"/>
  </g>

  <!-- Raspberry Pi -->
  <rect x="340" y="200" width="220" height="120" rx="10" fill="#166534" stroke="#4ade80" stroke-width="2"/>
  <text x="450" y="235" text-anchor="middle" fill="#f0fdf4" font-size="16" font-weight="bold">Raspberry Pi</text>
  <text x="450" y="258" text-anchor="middle" fill="#dcfce7" font-size="11">GPIO + I2C + SPI + 1-Wire</text>
  <text x="450" y="278" text-anchor="middle" fill="#dcfce7" font-size="11">Python 3 Processing Layer</text>
  <text x="450" y="298" text-anchor="middle" fill="#dcfce7" font-size="11">main.py orchestrator</text>

  <!-- Arrow to storage -->
  <path d="M560 260 L680 260" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Storage -->
  <rect x="680" y="220" width="180" height="80" rx="8" fill="#7c2d12" stroke="#fb923c" stroke-width="2"/>
  <text x="770" y="255" text-anchor="middle" fill="#fff7ed" font-size="14" font-weight="bold">Local Storage</text>
  <text x="770" y="275" text-anchor="middle" fill="#fed7aa" font-size="11">CSV Data Logger</text>
  <text x="770" y="290" text-anchor="middle" fill="#fed7aa" font-size="10">data_logger.py</text>

  <!-- Future cloud (dotted) -->
  <path d="M770 220 L770 130" stroke="#64748b" stroke-width="2" stroke-dasharray="6,4" fill="none" marker-end="url(#arrow)"/>
  <rect x="680" y="70" width="180" height="60" rx="8" fill="#1e1b4b" stroke="#818cf8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="770" y="95" text-anchor="middle" fill="#c7d2fe" font-size="12">Cloud Dashboard</text>
  <text x="770" y="112" text-anchor="middle" fill="#a5b4fc" font-size="10">(Future Enhancement)</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
